services:
  # 1. База даних PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: marketplace_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Redis для сесійних кошиків
  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data

  # 3. Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: marketplace_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  # 4. Наш API сервер (Express)
  api:
    build: 
      context: ./apps/api
    container_name: marketplace_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - PORT=${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata: