services:
  # 1. База даних PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: marketplace_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Redis для сесійних кошиків
  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  # 4. Наш API сервер (Express)
  api:
    build:
      context: ./apps/api
    container_name: marketplace_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secretpassword}@postgres:5432/${POSTGRES_DB:-marketplace}?schema=public
      - PORT=${API_PORT:-4000}
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    depends_on:
      - postgres
      - redis

  # 5. Фронтенд Next.js клієнт
  web:
    build:
      context: ./apps/web
    container_name: marketplace_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Для клієнтських компонентів (йде через браузер -> Nginx)
      - NEXT_PUBLIC_API_URL=http://localhost/api
      # Для серверних компонентів (йде напряму всередині Docker)
      - API_INTERNAL_URL=http://api:4000
    depends_on:
      - api

  # 3. Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: marketplace_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
  redisdata: